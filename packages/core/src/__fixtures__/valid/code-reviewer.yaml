id: code-reviewer
version: 1.0.0
phase: review
description: >
  Reviews a PR diff against security, performance, and convention checklists.
  Outputs a structured review report with severity-tagged findings.
model_hint: high-reasoning
model_variants:
  claude:
    prompt_append: "Use extended thinking for the security analysis step."
  gemini:
    prompt_append: "Present conclusions before details."

tools_required:
  - read_file
  - grep
  - git_diff

inputs:
  - name: pr_diff
    description: The unified diff of the PR
    required: true
  - name: context
    description: "Short description of what the PR does (1-2 sentences)"
    required: false

workflow:
  - step: Read the full diff and categorize changed files by type (logic, config, test, docs)
  - step: "Run security checklist (ref: policies/security-checklist.md)"
  - step: "Run convention checklist (ref: policies/conventions.md)"
  - step: Identify performance-sensitive changes (N+1 queries, missing indexes, large allocations)
  - step: "Summarize findings: Critical / Warning / Suggestion with line references"
  - step: Output review report using the review-report template

output_template: templates/review-report.md
policies:
  - security-checklist
  - conventions
