<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docs — sdlc-agent</title>
  <link rel="stylesheet" href="style.css" />
  <script src="docs-manifest.js"></script>
  <script src="work/_index.js"></script>
</head>

<body class="page-index">
  <div class="doc-hub">
    <header class="doc-hub-header">
      <span class="doc-hub-logo">📚</span>
      <div>
        <h1 class="doc-hub-title">sdlc-agent</h1>
        <p class="doc-hub-sub">Documentation</p>
      </div>
    </header>
    <div id="doc-hub-groups"></div>
  </div>

  <script>
    (function () {
      var manifest = window.__DOCS_MANIFEST__;
      var workIndex = (window.__DOCS_INDEX__ || {})['work'];
      var root = document.getElementById('doc-hub-groups');

      manifest.groups.forEach(function (group) {
        var section = makeSection(group.label);
        var cards = section.querySelector('.doc-cards');

        var firstEntry = group.entries && group.entries[0];
        if (firstEntry && firstEntry.expandable) {
          // Expandable group: read sub-entries from __DOCS_INDEX__
          var idx = (window.__DOCS_INDEX__ || {})[firstEntry.slug];
          if (!idx) return;
          idx.entries.forEach(function (parent) {
            var sub = document.createElement('div');
            sub.className = 'doc-card-subgroup';
            sub.textContent = parent.title;
            cards.appendChild(sub);
            (parent.docs || []).forEach(function (doc) {
              cards.appendChild(makeCard(doc));
            });
          });
        } else {
          group.entries.forEach(function (entry) {
            cards.appendChild(makeCard(entry));
          });
        }

        root.appendChild(section);
      });

      function makeSection(label) {
        var s = document.createElement('section');
        s.className = 'doc-hub-section';
        s.innerHTML = '<h2 class="doc-hub-section-label">' + label + '</h2><div class="doc-cards"></div>';
        return s;
      }

      function makeCard(entry) {
        var href = entry.file || entry.md;
        if (!href) return document.createDocumentFragment();
        var a = document.createElement('a');
        a.href = href;
        a.className = 'doc-card';
        var icon = entry.icon ? '<span class="doc-card-icon">' + entry.icon + '</span>' : '';
        var badge = (!entry.file && entry.md) ? '<span class="doc-card-badge">MD</span>' : '';
        a.innerHTML = icon + '<span class="doc-card-title">' + entry.title + '</span>' + badge;
        return a;
      }
    })();
  </script>
</body>

</html>
