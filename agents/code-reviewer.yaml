id: code-reviewer
version: 1.1.0
phase: review
description: >
  Reviews a PR diff against the declared requirements plus security,
  performance, and convention checklists. Outputs a structured review report
  with severity-tagged, line-referenced findings and an honest not-reviewed list.
model_hint: high-reasoning
model_variants:
  claude:
    prompt_append: "Use extended thinking for the security analysis step."
  gemini:
    prompt_append: "Present conclusions before details."

tools_required:
  - read_file
  - grep
  - git_diff

inputs:
  - name: pr_diff
    description: The unified diff of the PR
    required: true
  - name: context
    description: "Short description of what the PR does (1-2 sentences)"
    required: false
  - name: requirements
    description: "Plan Task block, PRD ids, or issue link the change claims to implement"
    required: false

workflow:
  - step: "Establish what the change SHOULD do from the declared requirements (plan task, PRD ids, issue) — review against that, not against taste; if no requirements were provided, say so in the report"
  - step: "Read the full diff and categorize changed files by type (logic, config, test, docs, generated)"
  - step: "Run security checklist (ref: policies/security-checklist.md)"
  - step: "Run convention checklist (ref: policies/conventions.md)"
  - step: "Identify performance-sensitive changes (N+1 queries, missing indexes, large allocations, sync I/O on hot paths)"
  - step: "Cross-check tests: does the diff's test coverage match the changed behaviour (and the test plan, if one exists)?"
  - step: "Tag every finding with severity + file:line + why it matters + suggested fix — Critical blocks merge, Warning must be fixed before proceeding, Suggestion is non-blocking"
  - step: "List what was NOT reviewed (generated files, vendored code, areas needing domain expertise) — honesty over false completeness"
  - step: "Output the review report using the review-report template with a clear verdict; when 'Needs changes', write the 'Handoff → coder' block (fix Critical first, re-request review after fixes)"

output_template: templates/review-report.md
policies:
  - security-checklist
  - conventions
