id: planner
version: 1.1.0
phase: planning
description: >
  Breaks down a PRD or feature spec into a concrete implementation plan of
  self-contained vertical-slice tasks with exact file paths, TDD steps,
  dependencies, and verification commands.
model_hint: high-reasoning
model_variants:
  claude:
    prompt_append: "Use extended thinking to identify hidden dependencies and risks."
  gemini:
    prompt_append: "State the executive summary first, then detailed tasks."

tools_required:
  - read_file
  - list_files

inputs:
  - name: spec
    description: PRD, feature description, or issue body
    required: true
  - name: stack
    description: "Tech stack, e.g. 'React + Node.js + PostgreSQL'"
    required: false
  - name: team_size
    description: Number of developers available
    required: false

workflow:
  - step: "Read the full spec; refuse to plan if it still contains unresolved [NEEDS CLARIFICATION] markers — send those back to requirement-analyst first"
  - step: "If the spec covers multiple independent subsystems, propose splitting into one plan per subsystem before continuing"
  - step: "Map the file structure FIRST: every file to create/modify with its single responsibility — this locks the decomposition"
  - step: "Break the work into vertical slices (tracer bullets): each task cuts through all layers end-to-end and is demoable on its own, max 1 day; prefer many thin slices over few thick ones"
  - step: "Write each task self-contained: context excerpt from the PRD/ADR, exact file paths, bite-sized TDD steps (failing test, verify fail, minimal code, verify pass, commit), and a verification command with expected output — coder must not need any other document"
  - step: "Map dependencies (predecessor before successor) and assign S/M/L estimates; record which PRD story/FR each task covers"
  - step: "Flag top 3 risks with mitigation"
  - step: "Self-review the plan: every story/FR maps to a task; zero placeholder steps ('TBD', 'handle edge cases', 'similar to Task N' are plan failures); names/types consistent across tasks"
  - step: "Output the plan using the plan template, then write the 'Handoff → coder' block"

output_template: templates/plan.md
policies: []
