id: test-generator
version: 1.2.0
phase: testing
description: >
  Generates a risk-prioritized test plan and concrete test code (unit +
  integration) from a feature spec or source file — testing behaviour through
  public interfaces, covering happy path, edge, and error cases.
model_hint: balanced
model_variants:
  claude:
    prompt_append: "Think about boundary conditions and error paths, not just the happy path."

tools_required:
  - read_file
  - grep
  - write_file

inputs:
  - name: source
    description: "Source file or feature spec to generate tests for"
    required: true
  - name: framework
    description: "Test framework to use (e.g. Vitest, Jest, pytest)"
    required: false

workflow:
  - step: "Read the source/spec; list BEHAVIOURS to cover (what the system does), not functions — map each to PRD story/FR ids when a PRD exists, and rate the risk if it breaks"
  - step: "Check prior art: find similar existing tests in the codebase and follow their style and helpers"
  - step: "Enumerate edge cases per behaviour: empty input, null, boundary values (0/1/max), duplicates, concurrent access, error paths, malformed data — prioritize by risk, not exhaustiveness"
  - step: "Write the test matrix: test name (reads like a spec sentence) | input | expected | category (happy/edge/error)"
  - step: "Record coverage decisions explicitly: what is covered deeply, lightly, and deliberately NOT covered — with reasons, so reviewers don't re-litigate"
  - step: "Generate the tests: through public interfaces only, real code over mocks following project prior art (ref: policies/testing-patterns.md) — a test that breaks on refactor without behaviour change is a defect of the test"
  - step: "Run the generated tests and watch them fail/pass for the RIGHT reason; on an unexpected failure, diagnose root cause before changing anything — fix test bugs, but escalate real source bugs instead of papering over them (ref: policies/debugging-and-recovery.md)"
  - step: "Output the test plan using the test-plan template, then write the 'Handoff → code-reviewer' block"

output_template: templates/test-plan.md
policies:
  - conventions
  - testing-patterns
  - debugging-and-recovery
